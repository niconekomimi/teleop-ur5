joy_driver_node:
  ros__parameters:
    # ==========================================================
    # 1) 设备选择
    # ==========================================================
    # auto | xbox | ps5 | generic
    profile: "auto"

    # 留空则自动发现，例如：/dev/input/event25。
    device_path: ""

    # 可填设备名子串，例如："Xbox"。
    device_name: ""

    # ==========================================================
    # 2) 发布行为
    # ==========================================================
    publish_rate_hz: 100.0

    # 建议与 teleop 的 deadzone 保持一致。
    deadzone: 0.05

    use_sim_time: false

    # ==========================================================
    # 3) 重连行为
    # ==========================================================
    autoreconnect: true

    scan_interval_sec: 1.0
