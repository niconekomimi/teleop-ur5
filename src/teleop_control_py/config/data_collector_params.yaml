data_collector:
  ros__parameters:
    # ==========================================================
    # 1) 输出与采样
    # ==========================================================
    output_path: "/home/rvl/collect_datasets_ws/data/libero_demos.hdf5"
    record_fps: 10.0
    # <= 0 时关闭周期统计输出。
    stats_period_sec: 2.0

    # ==========================================================
    # 2) 相机来源
    # ==========================================================
    # realsense | oakd
    global_camera_source: "realsense"
    wrist_camera_source: "oakd"

    # ==========================================================
    # 3) 机器人状态输入
    # ==========================================================
    joint_states_topic: "/joint_states"

    tool_pose_topic: "/tcp_pose_broadcaster/pose"

    # 必须与 /joint_states.name 中的关节名一致。
    joint_names:
      - shoulder_pan_joint
      - shoulder_lift_joint
      - elbow_joint
      - wrist_1_joint
      - wrist_2_joint
      - wrist_3_joint

    # ==========================================================
    # 4) 夹爪状态选择
    # ==========================================================
    # robotic_gripper | qbsofthand
    end_effector_type: "robotic_gripper"

    # 留空则按 end_effector_type 自动选择。
    gripper_state_topic: "/gripper/cmd"

    robotic_gripper_state_topic: "/gripper/state"
    qbsofthand_state_topic: "/gripper/cmd"

    # true: 丢帧；false: 缺失时回退为 0.0。
    require_gripper: false

    # ==========================================================
    # 5) 时间戳有效性
    # ==========================================================
    pose_max_age_sec: 0.05
    gripper_max_age_sec: 0.5
    # 位姿时间戳为零时，使用当前采样时刻作为参考。
    pose_stamp_zero_is_ref: true

    # ==========================================================
    # 6) 图像处理与写盘
    # ==========================================================
    # 节点内部会强制使用 224。
    obs_image_size: 224

    # lzf | gzip | none
    image_compression: "gzip"

    # 队列满时会丢帧，不阻塞回调线程。
    queue_maxsize: 400
    writer_batch_size: 32
    writer_flush_every_n: 200

    # ==========================================================
    # 7) Go Home 与控制器切换
    # ==========================================================
    home_joint_trajectory_topic: "/scaled_joint_trajectory_controller/joint_trajectory"
    home_duration_sec: 3.0
    # 单位 rad，顺序与 joint_names 一致。
    home_joint_positions: [1.524178, -2.100060, 1.864580, -1.345048, -1.575888, 1.528195]
    teleop_controller: "forward_position_controller"
    trajectory_controller: "scaled_joint_trajectory_controller"

    # ==========================================================
    # 8) 可选键盘控制
    # ==========================================================
    # r: 开始录制，s: 停止录制，q: 退出；需要回车确认。
    enable_keyboard: false
