teleop_control_node:
  ros__parameters:
    # ==========================================================
    # 1) 后端选择
    # ==========================================================
    # joy | mediapipe
    input_type: "joy"

    # robotiq | qbsofthand
    gripper_type: "robotiq"

    control_hz: 50.0

    # ==========================================================
    # 2) 机械臂输出与运动限幅
    # ==========================================================
    target_frame_id: "base"
    servo_twist_topic: "/servo_node/delta_twist_cmds"

    auto_start_servo: true
    start_servo_service: "/servo_node/start_servo"

    auto_switch_controllers: true
    controller_manager_ns: "/controller_manager"
    teleop_controller: "forward_position_controller"
    trajectory_controller: "scaled_joint_trajectory_controller"
    startup_retry_period_sec: 1.0

    # 速度 / 加速度限幅；松手后对应轴直接回零。
    max_linear_vel: 1.5
    max_angular_vel: 3.0
    max_linear_accel: 4.0
    max_angular_accel: 8.0

    # ==========================================================
    # 3) Joy 手柄输入
    # ==========================================================
    joy_topic: "/joy"

    # linear | cubic
    joy_deadzone: 0.05
    joy_curve: "linear"

    joy_deadman_enabled: false
    deadman_button: -1
    deadman_axis: 4
    deadman_axis_threshold: 0.5

    # 轴为 -1 时，改由按钮控制该自由度。
    linear_x_axis: 0
    linear_y_axis: 1
    linear_z_axis: -1
    linear_axis_sign: [-1.0, -1.0, 1.0]
    linear_z_up_button: 1
    linear_z_down_button: 0

    angular_x_axis: 3
    angular_y_axis: 2
    angular_z_axis: -1
    angular_axis_sign: [-1.0, 1.0, 1.0]
    angular_z_positive_button: 3
    angular_z_negative_button: 2

    # gripper_axis >= 0 时优先使用轴控制。
    gripper_close_button: 5
    gripper_open_button: 4
    gripper_axis: -1
    gripper_axis_inverted: false

    # ==========================================================
    # 4) MediaPipe 输入
    # ==========================================================
    # 消息格式：[vx, vy, vz, wx, wy, wz, gripper, optional_deadman]
    mediapipe_topic: "/mediapipe/hand_pose"
    mediapipe_deadzone: 0.02
    mediapipe_linear_scale: 1.0
    mediapipe_angular_scale: 1.0
    mediapipe_linear_axis_mapping: [0, 1, 2]
    mediapipe_angular_axis_mapping: [0, 1, 2]
    mediapipe_linear_axis_sign: [1.0, 1.0, 1.0]
    mediapipe_angular_axis_sign: [1.0, 1.0, 1.0]

    # ==========================================================
    # 5) 夹爪输出
    # ==========================================================
    gripper_cmd_topic: "/gripper/cmd"
    gripper_command_delta: 0.01

    # confidence_topic: [-1, 1]，正数打开，负数闭合
    # binary_topic: 1.0 打开，-1.0 闭合
    robotiq_command_interface: "confidence_topic"
    robotiq_confidence_topic: "/robotiq_2f_gripper/confidence_command"
    robotiq_binary_topic: "/robotiq_2f_gripper/binary_command"
    robotiq_binary_threshold: 0.5

    # 优先调用服务，/gripper/cmd 仍作为状态代理。
    qbsofthand_service_name: "/qbsofthand_control_node/set_closure"
    qbsofthand_duration_sec: 0.3
    qbsofthand_speed_ratio: 1.0
